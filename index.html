<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Доска достижений Beko</title>
    <style>
        /* ===== Стили (те же, что были) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body {
            background: linear-gradient(135deg, #0b2a4a 0%, #1b4a7a 100%);
            min-height: 100vh;
            padding: 20px 12px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #0b2a4a;
            margin-bottom: 8px;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #1b4a7a;
            margin-left: auto;
            background: #eef4fa;
            padding: 4px 18px;
            border-radius: 40px;
        }
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0 24px;
        }
        .stat-card {
            background: #f0f6fd;
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #0b2a4a;
            font-size: 0.95rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .stat-card span {
            background: #0b2a4a;
            color: white;
            padding: 0 14px;
            border-radius: 40px;
            font-size: 1rem;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin: 16px 0 24px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 600px;
        }
        th {
            background: #0b2a4a;
            color: white;
            padding: 14px 10px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            text-align: left;
        }
        th:last-child { text-align: center; }
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e9edf2;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8faff; }
        .rank {
            font-weight: 700;
            font-size: 1.1rem;
            text-align: center;
            width: 34px;
            color: #0b2a4a;
        }
        .rank.gold { color: #f5b342; }
        .rank.silver { color: #a0aec0; }
        .rank.bronze { color: #cd7f32; }
        .avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: #d4e2f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0b2a4a;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .supervisor-info {
            display: flex;
            align-items: center;
        }
        .supervisor-name {
            font-weight: 600;
            font-size: 1rem;
        }
        .supervisor-team {
            font-size: 0.75rem;
            color: #6b7a8f;
            margin-left: 6px;
        }
        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .badge {
            background: #eef4fa;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #0b2a4a;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .badge.gold { background: #fff3d6; border-color: #f5b342; color: #8d6b1f; }
        .badge.blue { background: #d9e8ff; border-color: #3b82f6; color: #1a4f8b; }
        .badge.green { background: #d4f0e0; border-color: #2e9b6e; color: #1a6b4a; }
        .score-cell {
            text-align: center;
            font-weight: 700;
            font-size: 1.3rem;
            color: #0b2a4a;
        }
        .score-cell small {
            font-weight: 400;
            font-size: 0.65rem;
            color: #6b7a8f;
        }
        .btn {
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.15s;
            background: #eef4fa;
            color: #0b2a4a;
        }
        .btn:hover { transform: scale(1.03); }
        .btn:active { transform: scale(0.95); }
        .btn-primary {
            background: #0b2a4a;
            color: white;
            box-shadow: 0 2px 8px rgba(11,42,74,0.25);
        }
        .btn-primary:hover { background: #1b4a7a; }
        .btn-success { background: #2e9b6e; color: white; }
        .btn-danger { background: #c0392b; color: white; }
        .btn-warning { background: #f5b342; color: #0b2a4a; }
        .action-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            align-items: center;
        }
        .action-group .btn { font-size: 0.7rem; padding: 4px 10px; }
        .footer-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        .footer-actions .btn { padding: 10px 22px; font-size: 0.9rem; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 32px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px 24px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            position: relative;
        }
        .modal h2 {
            font-size: 1.5rem;
            color: #0b2a4a;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal .close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #6b7a8f;
        }
        .modal .close:hover { color: #0b2a4a; }
        .modal label {
            font-weight: 600;
            display: block;
            margin: 12px 0 4px;
            color: #0b2a4a;
        }
        .modal input, .modal select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 16px;
            border: 1px solid #d4e2f0;
            font-size: 0.95rem;
        }
        .modal .btn { width: 100%; padding: 12px; margin-top: 16px; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #f5b342; }
            100% { transform: scale(1); }
        }
        .pop-score { animation: pop 0.3s ease; }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #0b2a4a;
        }
        @media (max-width: 700px) {
            .container { padding: 16px 12px; }
            h1 { font-size: 1.4rem; }
            h1 small { font-size: 0.7rem; padding: 2px 12px; }
            .stat-card { font-size: 0.8rem; padding: 6px 14px; }
            td, th { padding: 8px 6px; font-size: 0.8rem; }
            .badge { font-size: 0.6rem; padding: 1px 6px; }
            .score-cell { font-size: 1.1rem; }
            .action-group .btn { font-size: 0.6rem; padding: 3px 8px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>
        🏆 Доска достижений Beko
        <small>Супервайзеры · Крупная техника</small>
    </h1>

    <div class="stats-row">
        <div class="stat-card">👥 Всего <span id="totalCount">0</span></div>
        <div class="stat-card">⭐ Бекойнов <span id="totalCoins">0</span></div>
        <div class="stat-card">🏅 Ачивок <span id="totalBadges">0</span></div>
        <div class="stat-card">⚔️ Поединков <span id="totalDuels">0</span></div>
    </div>

    <div id="loadingIndicator" class="loading">⏳ Загрузка данных...</div>

    <div class="table-wrap" id="tableWrap" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th style="width:40px;">#</th>
                    <th>Супервайзер</th>
                    <th style="min-width:120px;">Достижения</th>
                    <th style="width:100px; text-align:center;">Бекойны</th>
                    <th style="width:140px; text-align:center;">Действия</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <div class="footer-actions" id="actionButtons" style="display:none;">
        <button class="btn btn-primary" onclick="openDuelModal()">⚔️ Поединки</button>
        <button class="btn btn-success" onclick="weeklyAward()">📆 Недельное начисление</button>
        <button class="btn btn-warning" onclick="exportCSV()">⬇️ Экспорт CSV</button>
        <button class="btn btn-primary" onclick="document.getElementById('importFile').click()">⬆️ Импорт CSV</button>
        <input type="file" id="importFile" accept=".csv" style="display:none" onchange="importCSV(event)">
        <button class="btn btn-danger" onclick="resetAll()">🔄 Сброс (очистить баллы)</button>
    </div>
</div>

<!-- Модальное окно: Поединки -->
<div class="modal-overlay" id="duelModal">
    <div class="modal">
        <h2>
            ⚔️ Управление поединками
            <button class="close" onclick="closeModal('duelModal')">&times;</button>
        </h2>
        <div id="duelContent"></div>
    </div>
</div>

<!-- Модальное окно: Недельное начисление -->
<div class="modal-overlay" id="weeklyModal">
    <div class="modal">
        <h2>
            📆 Недельное начисление баллов
            <button class="close" onclick="closeModal('weeklyModal')">&times;</button>
        </h2>
        <div id="weeklyContent"></div>
    </div>
</div>

<script>
    // ================================================================
    // 1. КОНФИГУРАЦИЯ
    // ================================================================
    const API_URL = https://script.google.com/macros/s/AKfycbyqVIgPhYujjq5ewzZt3AIga6RhawHWbtUzkbEJuBoCcLisimbDrJx_Q4aWheTTEePljA/exec

    // ================================================================
    // 2. ГЛОБАЛЬНОЕ СОСТОЯНИЕ
    // ================================================================
    let supervisors = [];          // текущий массив супервайзеров (из таблицы)
    let duels = [];               // локально (в localStorage)
    let weeklyHistory = [];

    // ================================================================
    // 3. ЗАГРУЗКА ДАННЫХ ИЗ API
    // ================================================================
    async function loadFromAPI() {
        try {
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('tableWrap').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';

            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Ошибка загрузки');
            const data = await response.json();
            supervisors = data;
            // Загружаем локальные данные (поединки, историю)
            loadLocalData();
            render();
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('tableWrap').style.display = 'block';
            document.getElementById('actionButtons').style.display = 'flex';
        } catch (e) {
            alert('Не удалось загрузить данные из Google Таблицы. Проверьте интернет и URL.');
            console.error(e);
            document.getElementById('loadingIndicator').textContent = '❌ Ошибка загрузки. Перезагрузите страницу.';
        }
    }

    // ================================================================
    // 4. СОХРАНЕНИЕ В API (POST)
    // ================================================================
    async function saveToAPI() {
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', // важно для GAS – ответ может быть пустым
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ supervisors })
            });
            // При no-cors мы не можем прочитать ответ, но запрос уходит.
            // Для отладки можно использовать режим 'cors', но тогда нужны заголовки в скрипте.
            // Сообщим пользователю об успехе условно.
            console.log('Данные отправлены в таблицу');
        } catch (e) {
            console.error('Ошибка сохранения:', e);
            alert('Не удалось сохранить данные в таблицу. Проверьте подключение.');
        }
    }

    // ================================================================
    // 5. ЛОКАЛЬНЫЕ ДАННЫЕ (поединки, история)
    // ================================================================
    function loadLocalData() {
        const saved = localStorage.getItem('bekoLocal');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                duels = parsed.duels || [];
                weeklyHistory = parsed.weeklyHistory || [];
            } catch(e) {}
        } else {
            duels = [];
            weeklyHistory = [];
        }
    }

    function saveLocalData() {
        localStorage.setItem('bekoLocal', JSON.stringify({ duels, weeklyHistory }));
    }

    // ================================================================
    // 6. ЛОГИКА ДОСТИЖЕНИЙ
    // ================================================================
    function updateBadges(sup) {
        const newBadges = [];
        if (sup.coins >= 100) newBadges.push('🏅 План');
        if (sup.coins >= 200) newBadges.push('📚 Эксперт');
        if (sup.coins >= 300) newBadges.push('⚡ Актив');
        if (sup.coins >= 400) newBadges.push('🌟 Лидер');
        if (sup.coins >= 500) newBadges.push('💎 Мастер');
        sup.badges = [...new Set(newBadges)];
        return sup.badges;
    }

    // ================================================================
    // 7. ОТРИСОВКА
    // ================================================================
    function render() {
        const sorted = [...supervisors].sort((a, b) => b.coins - a.coins);
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = '';

        sorted.forEach((sup, idx) => {
            const rank = idx + 1;
            let rankClass = 'rank';
            if (rank === 1) rankClass += ' gold';
            else if (rank === 2) rankClass += ' silver';
            else if (rank === 3) rankClass += ' bronze';

            updateBadges(sup);
            const badgesHtml = sup.badges.length
                ? sup.badges.map(b => `<span class="badge gold">${b}</span>`).join('')
                : '<span style="color:#a0aec0;font-size:0.7rem;">—</span>';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="${rankClass}">${rank}</span></td>
                <td>
                    <div class="supervisor-info">
                        <div class="avatar">${sup.name.charAt(0)}</div>
                        <div>
                            <div class="supervisor-name">${sup.name}</div>
                            <div class="supervisor-team">${sup.team}</div>
                        </div>
                    </div>
                </td>
                <td><div class="badges">${badgesHtml}</div></td>
                <td class="score-cell" id="score-${sup.id}">
                    ${sup.coins} <small>B</small>
                </td>
                <td>
                    <div class="action-group">
                        <button class="btn btn-primary" onclick="addCoins(${sup.id}, 10)">+10</button>
                        <button class="btn btn-warning" onclick="challenge(${sup.id})">⚔️</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });

        // Статистика
        document.getElementById('totalCount').textContent = supervisors.length;
        const totalCoins = supervisors.reduce((sum, s) => sum + s.coins, 0);
        document.getElementById('totalCoins').textContent = totalCoins;
        const totalBadges = supervisors.reduce((sum, s) => sum + s.badges.length, 0);
        document.getElementById('totalBadges').textContent = totalBadges;
        document.getElementById('totalDuels').textContent = duels.length;
    }

    // ================================================================
    // 8. ДЕЙСТВИЯ С МОНЕТАМИ (с синхронизацией)
    // ================================================================
    async function addCoins(id, amount) {
        const sup = supervisors.find(s => s.id === id);
        if (!sup) return;
        sup.coins += amount;
        updateBadges(sup);
        render();
        // анимация
        const el = document.getElementById(`score-${id}`);
        if (el) {
            el.classList.remove('pop-score');
            void el.offsetWidth;
            el.classList.add('pop-score');
        }
        // Сохраняем в API
        await saveToAPI();
    }

    // ================================================================
    // 9. ПОЕДИНКИ (локально)
    // ================================================================
    function challenge(challengerId) {
        const opponents = supervisors.filter(s => s.id !== challengerId);
        if (opponents.length === 0) {
            alert('Нет доступных оппонентов');
            return;
        }
        const modal = document.getElementById('duelModal');
        const content = document.getElementById('duelContent');
        let html = `<p>Вызов от <strong>${supervisors.find(s => s.id === challengerId).name}</strong></p>
                    <label>Выберите соперника:</label><select id="duelOpponent">`;
        opponents.forEach(o => {
            html += `<option value="${o.id}">${o.name}</option>`;
        });
        html += `</select>
                 <button class="btn btn-primary" onclick="createDuel(${challengerId})">Бросить вызов</button>
                 <button class="btn btn-danger" onclick="closeModal('duelModal')">Отмена</button>`;
        content.innerHTML = html;
        modal.classList.add('active');
    }

    function createDuel(challengerId) {
        const opponentId = parseInt(document.getElementById('duelOpponent').value);
        if (!opponentId) return;
        const existing = duels.find(d =>
            (d.challengerId === challengerId && d.opponentId === opponentId && d.status !== 'finished') ||
            (d.challengerId === opponentId && d.opponentId === challengerId && d.status !== 'finished')
        );
        if (existing) {
            alert('Поединок между этими супервайзерами уже активен!');
            return;
        }
        const duel = {
            id: Date.now(),
            challengerId,
            opponentId,
            status: 'pending',
            startDate: null,
            endDate: null,
            winnerId: null,
            challengerCoinsAtStart: supervisors.find(s => s.id === challengerId)?.coins || 0,
            opponentCoinsAtStart: supervisors.find(s => s.id === opponentId)?.coins || 0,
        };
        duels.push(duel);
        saveLocalData();
        closeModal('duelModal');
        render();
        openDuelModal();
    }

    function openDuelModal() {
        const modal = document.getElementById('duelModal');
        const content = document.getElementById('duelContent');
        let html = '';
        if (duels.length === 0) {
            html = '<p>Нет активных поединков.</p>';
        } else {
            duels.forEach((d, idx) => {
                const challenger = supervisors.find(s => s.id === d.challengerId);
                const opponent = supervisors.find(s => s.id === d.opponentId);
                const statusText = d.status === 'pending' ? '⏳ Ожидает' :
                                   d.status === 'active' ? '⚔️ В процессе' : '✅ Завершён';
                const winner = d.winnerId ? supervisors.find(s => s.id === d.winnerId) : null;
                html += `<div style="border-bottom:1px solid #e9edf2; padding:12px 0;">
                            <strong>${challenger?.name}</strong> vs <strong>${opponent?.name}</strong><br>
                            Статус: ${statusText}
                            ${winner ? ` | Победитель: ${winner.name}` : ''}
                            <br>
                            <button class="btn btn-success" onclick="acceptDuel(${d.id})" ${d.status !== 'pending' ? 'disabled' : ''}>Принять</button>
                            <button class="btn btn-primary" onclick="startDuel(${d.id})" ${d.status !== 'pending' ? 'disabled' : ''}>Начать</button>
                            <button class="btn btn-danger" onclick="finishDuel(${d.id})" ${d.status !== 'active' ? 'disabled' : ''}>Завершить</button>
                            <button class="btn btn-warning" onclick="removeDuel(${d.id})">🗑️</button>
                         </div>`;
            });
        }
        html += `<button class="btn btn-primary" onclick="closeModal('duelModal'); challenge(${supervisors[0]?.id});" style="margin-top:12px;">➕ Новый вызов</button>`;
        content.innerHTML = html;
        modal.classList.add('active');
    }

    function acceptDuel(duelId) {
        const duel = duels.find(d => d.id === duelId);
        if (!duel || duel.status !== 'pending') return;
        duel.status = 'active';
        duel.startDate = new Date().toISOString();
        duel.challengerCoinsAtStart = supervisors.find(s => s.id === duel.challengerId)?.coins || 0;
        duel.opponentCoinsAtStart = supervisors.find(s => s.id === duel.opponentId)?.coins || 0;
        saveLocalData();
        openDuelModal();
        render();
    }

    function startDuel(duelId) { acceptDuel(duelId); }

    async function finishDuel(duelId) {
        const duel = duels.find(d => d.id === duelId);
        if (!duel || duel.status !== 'active') return;
        const challenger = supervisors.find(s => s.id === duel.challengerId);
        const opponent = supervisors.find(s => s.id === duel.opponentId);
        if (!challenger || !opponent) return;
        const challengerGain = challenger.coins - duel.challengerCoinsAtStart;
        const opponentGain = opponent.coins - duel.opponentCoinsAtStart;
        let winnerId = null;
        if (challengerGain > opponentGain) winnerId = challenger.id;
        else if (opponentGain > challengerGain) winnerId = opponent.id;
        duel.status = 'finished';
        duel.endDate = new Date().toISOString();
        duel.winnerId = winnerId;
        if (winnerId) {
            const winner = supervisors.find(s => s.id === winnerId);
            if (winner) {
                winner.coins += 50;
                updateBadges(winner);
            }
        }
        saveLocalData();
        // Сохраняем изменения баллов в таблицу
        await saveToAPI();
        openDuelModal();
        render();
    }

    function removeDuel(duelId) {
        if (!confirm('Удалить запись о поединке?')) return;
        duels = duels.filter(d => d.id !== duelId);
        saveLocalData();
        openDuelModal();
        render();
    }

    // ================================================================
    // 10. НЕДЕЛЬНОЕ НАЧИСЛЕНИЕ
    // ================================================================
    function weeklyAward() {
        const modal = document.getElementById('weeklyModal');
        const content = document.getElementById('weeklyContent');
        let html = `<p>Введите баллы для каждого супервайзера по метрикам (за прошедшую неделю):</p>
                    <table style="width:100%; border-collapse:collapse; font-size:0.9rem;">
                        <tr style="background:#eef4fa;">
                            <th>Супервайзер</th>
                            <th>Рейтинг (0-10)</th>
                            <th>Повышение места</th>
                            <th>Понижение места</th>
                            <th>Best practice</th>
                            <th>Фокусные позиции</th>
                        </tr>`;
        supervisors.forEach(sup => {
            html += `<tr>
                        <td><strong>${sup.name}</strong></td>
                        <td><input type="number" min="0" max="10" value="0" id="w_rating_${sup.id}" style="width:60px;"></td>
                        <td><input type="number" min="0" value="0" id="w_up_${sup.id}" style="width:60px;"></td>
                        <td><input type="number" min="0" value="0" id="w_down_${sup.id}" style="width:60px;"></td>
                        <td><input type="number" min="0" value="0" id="w_best_${sup.id}" style="width:60px;"></td>
                        <td><input type="number" min="0" value="0" id="w_focus_${sup.id}" style="width:60px;"></td>
                    </tr>`;
        });
        html += `</table>
                 <button class="btn btn-success" onclick="applyWeeklyAward()">Применить начисление</button>
                 <button class="btn btn-danger" onclick="closeModal('weeklyModal')">Отмена</button>`;
        content.innerHTML = html;
        modal.classList.add('active');
    }

    async function applyWeeklyAward() {
        let totalAwarded = 0;
        supervisors.forEach(sup => {
            const rating = parseInt(document.getElementById(`w_rating_${sup.id}`).value) || 0;
            const up = parseInt(document.getElementById(`w_up_${sup.id}`).value) || 0;
            const down = parseInt(document.getElementById(`w_down_${sup.id}`).value) || 0;
            const best = parseInt(document.getElementById(`w_best_${sup.id}`).value) || 0;
            const focus = parseInt(document.getElementById(`w_focus_${sup.id}`).value) || 0;
            const points = rating * 2 + up * 5 - down * 5 + best * 8 + focus * 6;
            if (points !== 0) {
                sup.coins += points;
                updateBadges(sup);
                totalAwarded += points;
            }
        });
        weeklyHistory.push({
            date: new Date().toISOString(),
            awarded: totalAwarded
        });
        saveLocalData();
        closeModal('weeklyModal');
        render();
        await saveToAPI();
        alert(`Начислено ${totalAwarded} Бекойнов за неделю!`);
    }

    // ================================================================
    // 11. ЭКСПОРТ / ИМПОРТ CSV (работает с текущими данными)
    // ================================================================
    function exportCSV() {
        let csv = 'id,name,team,coins,badges\n';
        supervisors.forEach(s => {
            csv += `${s.id},"${s.name}","${s.team}",${s.coins},"${s.badges.join(';')}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'beko_supervisors.csv';
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function(e) {
            const text = e.target.result;
            const lines = text.split('\n').filter(line => line.trim() !== '');
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 5) continue;
                const id = parseInt(cols[0]);
                const name = cols[1].replace(/"/g, '');
                const team = cols[2].replace(/"/g, '');
                const coins = parseInt(cols[3]) || 0;
                const badgesStr = cols[4].replace(/"/g, '');
                const badges = badgesStr ? badgesStr.split(';').filter(b => b) : [];
                let sup = supervisors.find(s => s.id === id);
                if (sup) {
                    sup.name = name;
                    sup.team = team;
                    sup.coins = coins;
                    sup.badges = badges;
                } else {
                    supervisors.push({ id, name, team, coins, badges });
                }
            }
            render();
            await saveToAPI();
            alert('Данные импортированы и сохранены в таблицу!');
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    // ================================================================
    // 12. СБРОС (очистка баллов, но не удаление супервайзеров)
    // ================================================================
    async function resetAll() {
        if (!confirm('Сбросить все баллы и достижения у всех супервайзеров?')) return;
        supervisors.forEach(s => {
            s.coins = 0;
            s.badges = [];
        });
        // Поединки не сбрасываем (оставляем историю)
        render();
        await saveToAPI();
        alert('Баллы сброшены!');
    }

    // ================================================================
    // 13. ВСПОМОГАТЕЛЬНЫЕ
    // ================================================================
    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }
    document.querySelectorAll('.modal-overlay').forEach(el => {
        el.addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });
    });

    // ================================================================
    // 14. ЗАПУСК
    // ================================================================
    loadFromAPI();

    // При каждой загрузке страницы – обновляем данные (можно по таймеру, но не будем)
    // Периодическое обновление – по желанию
    // setInterval(loadFromAPI, 60000); // каждую минуту
</script>
